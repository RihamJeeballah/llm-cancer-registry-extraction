    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        
            <div id="config"></div>
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "font": {"color": "white"}, "id": "chunker", "label": "chunker", "shape": "dot", "title": "Agent: chunker"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "retriever", "label": "retriever", "shape": "dot", "title": "Agent: retriever"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "grade_extractor", "label": "grade_extractor", "shape": "dot", "title": "Agent: grade_extractor"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "morph_extractor", "label": "morph_extractor", "shape": "dot", "title": "Agent: morph_extractor"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "tnm_extractor", "label": "tnm_extractor", "shape": "dot", "title": "Agent: tnm_extractor"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "review_agent", "label": "review_agent", "shape": "dot", "title": "Agent: review_agent"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "evaluator_agent", "label": "evaluator_agent", "shape": "dot", "title": "Agent: evaluator_agent"}, {"color": "#97c2fc", "font": {"color": "white"}, "id": "aggregation_agent", "label": "aggregation_agent", "shape": "dot", "title": "Agent: aggregation_agent"}, {"color": "green", "font": {"color": "white"}, "id": "__start__", "label": "START", "shape": "box", "title": "Start of Workflow"}, {"color": "red", "font": {"color": "white"}, "id": "__end__", "label": "END", "shape": "box", "title": "End of Workflow"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "morph_extractor", "to": "tnm_extractor"}, {"arrows": "to", "from": "grade_extractor", "to": "morph_extractor"}, {"arrows": "to", "from": "aggregation_agent", "to": "__end__"}, {"arrows": "to", "from": "chunker", "to": "retriever"}, {"arrows": "to", "from": "evaluator_agent", "to": "aggregation_agent"}, {"arrows": "to", "from": "retriever", "to": "grade_extractor"}, {"arrows": "to", "from": "__start__", "to": "chunker"}, {"arrows": "to", "from": "review_agent", "to": "evaluator_agent"}, {"arrows": "to", "from": "tnm_extractor", "to": "review_agent"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": true,
        "filter": [
            "physics"
        ]
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  
                  // if this network requires displaying the configure window,
                  // put it in its div
                  options.configure["container"] = document.getElementById("config");
                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
